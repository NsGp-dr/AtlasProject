<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RadioAtlas | Sintonizador de Datos Globales</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --panel: #0d1117; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        aside { width: 350px; background: var(--panel); border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        main { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; justify-content: center; align-items: center; }
        .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 4px; border: 1px solid #1f242c; }
        .btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { background: var(--accent); color: #000; }
        #data-viz { width: 80%; height: 300px; border-bottom: 2px solid var(--accent); display: flex; align-items: flex-end; gap: 2px; }
        .bar { background: var(--accent); flex: 1; transition: height 0.3s; }
        .log { color: var(--accent); font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<aside>
    <h2 style="color: var(--accent);">RADIO-ATLAS v3</h2>
    <p style="font-size: 0.7rem; color: #8b949e;">Sintonizando Telemetría Climática Real</p>
    
    <div class="card">
        <label>UBICACIÓN ACTUAL</label>
        <div id="loc-display" style="font-size: 0.9rem; margin-top: 5px;">Lat: 0.0, Lon: 0.0</div>
        <button class="btn" onclick="sintonizarMundo()" style="margin-top:10px;">Saltar a otra ciudad</button>
    </div>

    <div class="card">
        <label>ESTADO DEL ESPECTRO</label>
        <div id="temp-readout" style="font-size: 1.2rem; color: var(--accent);">--°C</div>
        <div id="weather-desc" style="font-size: 0.7rem;">Esperando señal...</div>
    </div>

    <button id="audioToggle" class="btn" style="background: var(--accent); color: black;" onclick="toggleAudio()">ENCENDER RADIO</button>
    <div class="log" id="status">> Listo para recibir JSON...</div>
</aside>

<main>
    <div id="data-viz"></div>
    <p style="margin-top: 20px; color: var(--accent);">LECTURA DE OSCILACIÓN TÉRMICA (7 DÍAS)</p>
</main>

<script>
    let audioCtx, masterGain;
    let isPlaying = false;
    let currentData = [];

    // Ciudades aleatorias para sintonizar
    const locations = [
        {name: "Bogotá", lat: 4.60, lon: -74.08},
        {name: "Reykjavík", lat: 64.12, lon: -21.82},
        {name: "Tokyo", lat: 35.67, lon: 139.65},
        {name: "Sahara", lat: 23.41, lon: 25.66},
        {name: "Antártida", lat: -75.25, lon: -0.07}
    ];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0.1;
        }
    }

    async function sintonizarMundo() {
        const loc = locations[Math.floor(Math.random() * locations.length)];
        document.getElementById('status').innerText = `> Sintonizando ${loc.name}...`;
        document.getElementById('loc-display').innerText = `Lat: ${loc.lat}, Lon: ${loc.lon}`;

        try {
            // API de Open-Meteo (Sin Key, Sin CORS)
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&hourly=temperature_2m,relative_humidity_2m`);
            const data = await response.json();
            
            currentData = data.hourly.temperature_2m.slice(0, 24); // Tomamos 24 horas de datos
            updateViz();
            
            document.getElementById('temp-readout').innerText = `${currentData[0]}°C`;
            document.getElementById('weather-desc').innerText = `Humedad: ${data.hourly.relative_humidity_2m[0]}%`;
            
            if(isPlaying) sonificarDatos();
        } catch (e) {
            document.getElementById('status').innerText = "> Error en la antena satelital.";
        }
    }

    function updateViz() {
        const container = document.getElementById('data-viz');
        container.innerHTML = '';
        currentData.forEach(temp => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            // Normalizar altura (de -10 a 40 grados)
            const h = Math.max(10, (temp + 10) * 5);
            bar.style.height = `${h}px`;
            container.appendChild(bar);
        });
    }

    function sonificarDatos() {
        initAudio();
        if(audioCtx.state === 'suspended') audioCtx.resume();

        // Sonificamos cada punto de datos como una nota
        currentData.forEach((temp, i) => {
            setTimeout(() => {
                if(!isPlaying) return;
                
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                
                // Mapeo: Temperatura -> Frecuencia
                // Frío = Grave, Calor = Agudo
                const freq = 200 + (temp * 15);
                
                osc.type = temp > 25 ? 'sawtooth' : 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                g.gain.setValueAtTime(0, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                
                osc.connect(g);
                g.connect(masterGain);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
                
                // Efecto visual en la barra
                document.querySelectorAll('.bar')[i].style.background = 'white';
                setTimeout(() => document.querySelectorAll('.bar')[i].style.background = '', 200);

            }, i * 200);
        });
    }

    function toggleAudio() {
        isPlaying = !isPlaying;
        document.getElementById('audioToggle').innerText = isPlaying ? "DETENER" : "ENCENDER RADIO";
        if(isPlaying) {
            if(currentData.length === 0) sintonizarMundo();
            else sonificarDatos();
        }
    }
</script>
</body>
</html>
